<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Hashing | RealAIID.com VSSN Generation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sumsub-blue: #1693E9;
            --sumsub-green: #18B494;
            --text-strong: #0B1320;
            --bg-interface: #0B1320;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-interface); color: white; min-height: 100vh; display: flex; flex-direction: column; }

        .header { background: rgba(11, 19, 32, 0.9); height: 90px; display: flex; align-items: center; padding: 0 5%; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo img { height: 70px; }

        /* --- ONBOARDING STEPS --- */
        .step-indicator { display: flex; justify-content: center; gap: 40px; padding: 40px 0; background: #111B2D; }
        .step { display: flex; align-items: center; gap: 10px; opacity: 0.4; font-size: 0.8rem; font-family: 'JetBrains Mono'; }
        .step.active { opacity: 1; color: var(--sumsub-blue); }
        .step-num { width: 24px; height: 24px; border: 1px solid currentColor; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* --- MAIN INTERFACE --- */
        .onboarding-main { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 60px 5%; }
        .capture-window { 
            width: 100%; 
            max-width: 800px; 
            background: #1E293B; 
            border-radius: 24px; 
            padding: 60px; 
            text-align: center; 
            border: 1px solid rgba(22, 147, 233, 0.2); 
            box-shadow: 0 0 50px rgba(22, 147, 233, 0.1);
        }

        .waveform-visual { 
            height: 120px; 
            background: #0F172A; 
            border-radius: 12px; 
            margin: 40px 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative;
            overflow: hidden;
        }
        .waveform-bar { width: 4px; background: var(--sumsub-green); margin: 0 2px; height: 20%; animation: pulse 1.5s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { height: 20%; } 50% { height: 80%; } }

        .prompt-text { font-size: 1.5rem; font-weight: 700; color: white; margin-bottom: 10px; }
        .sub-prompt { color: var(--sumsub-blue); font-family: 'JetBrains Mono'; font-size: 0.9rem; margin-bottom: 40px; }

        .btn-record { 
            background: var(--sumsub-blue); 
            color: white; 
            width: 80px; 
            height: 80px; 
            border-radius: 50%; 
            border: none; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0 auto;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(22, 147, 233, 0.4);
        }
        .btn-record:hover { transform: scale(1.1); background: #117aca; }
        .btn-record svg { width: 30px; height: 30px; }

        .security-footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 0.75rem; color: #64748B; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo"><img src="realaiid_commonwealth_logo_2026217.png" alt="RealAIID"></div>
    </header>

    <div class="step-indicator">
        <div class="step active"><span class="step-num">1</span> Liveness Check</div>
        <div class="step"><span class="step-num">2</span> Vocal Hashing</div>
        <div class="step"><span class="step-num">3</span> Anchor to Mainframe</div>
        <div class="step"><span class="step-num">4</span> Sovereign Issued</div>
    </div>

    <main class="onboarding-main">
        <div class="capture-window">
            <div class="prompt-text">"The Commonwealth anchors the soul."</div>
            <div class="sub-prompt">PLEASE REPEAT THE PHRASE ABOVE FOR SPATIAL ANALYSIS</div>

            <div class="waveform-visual">
                <div class="waveform-bar" style="animation-delay: 0.1s"></div>
                <div class="waveform-bar" style="animation-delay: 0.3s"></div>
                <div class="waveform-bar" style="animation-delay: 0.5s"></div>
                <div class="waveform-bar" style="animation-delay: 0.2s"></div>
                <div class="waveform-bar" style="animation-delay: 0.4s"></div>
                <div class="waveform-bar" style="animation-delay: 0.6s"></div>
                <div class="waveform-bar" style="animation-delay: 0.1s"></div>
            </div>

            <button class="btn-record">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            </button>

            <div class="security-footer">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                AES-256 HARDWARE ENCRYPTION ACTIVE // PHL NODE 1900
            </div>
        </div>
    </main>

    <footer style="padding: 20px; text-align: center; font-size: 0.7rem; color: #475569;">
        RealAIID Bureau Technical Onboarding Phase I
    </footer>

</body>
</html>
