<script async src="https://js.stripe.com/v3/buy-button.js"></script>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const tier = urlParams.get('tier');
    const portal = document.getElementById('stripe-portal');

    // MASTER TIER CONFIGURATION
    const tiers = {
        'standard': {
            card: 'card-standard',
            style: 'active-standard',
            price: '$149.00', 
            node: 'PHL-MAIN-01',
            clearance: 'LEVEL 1',
            protocol: 'CORE VSSN',
            button: 'buy_btn_1TGQegKIEi29Q59QbrPNJNxw' // NEW VERIFIED $149 BUTTON
        },
        'citizen': {
            card: 'card-citizen',
            style: 'active-citizen',
            price: '$149.00',
            node: 'PHL-MAIN-01',
            clearance: 'LEVEL 2',
            protocol: 'RESIDENCY',
            button: 'buy_btn_1TFv1EKIEi29Q59QCsLlndWJ' // ORIGINAL $149 BUTTON
        },
        'shield': {
            card: 'card-shield',
            style: 'active-shield',
            price: '$499.00',
            node: 'PHL-MAIN-99',
            clearance: 'LEVEL 4',
            protocol: 'ACTIVE DEFENSE',
            button: 'buy_btn_1TGOpzKIEi29Q59QpfWAgVWE'
        },
        'sovereign': {
            card: 'card-sovereign',
            style: 'active-sovereign',
            price: '$2,499.00',
            node: 'PHL-USA-001',
            clearance: 'OMNIPOTENT',
            protocol: 'IRREVOCABLE',
            button: 'buy_btn_1TGPAEKIEi29Q59QuXfF6W8k'
        }
    };

    // EXECUTION LOGIC
    // Defaults to 'citizen' ($149) if no valid tier is specified in the URL
    const active = tiers[tier] || tiers['citizen']; 

    // Update UI Elements
    document.getElementById(active.card).classList.add(active.style);
    document.getElementById('display-price').innerText = active.price;
    document.getElementById('node-id').innerText = active.node;
    document.getElementById('clearance-level').innerText = active.clearance;
    document.getElementById('protocol-name').innerText = active.protocol;

    // Apply specific UI colors for higher tiers
    if (tier === 'sovereign') {
        document.getElementById('display-price').style.color = 'var(--sovereign-platinum)';
    } else if (tier === 'shield') {
        document.getElementById('display-price').style.color = 'var(--gold)';
    } else {
        document.getElementById('display-price').style.color = 'var(--neon-blue)';
    }

    // Inject the Tier-Specific Stripe Button
    portal.innerHTML = `
        <stripe-buy-button
            buy-button-id="${active.button}"
            publishable-key="pk_test_51TFuJVKIEi29Q59QQKp63R0KZXwoUJkCedf6lYMEN4jeEKUruokHO9juO3FY5199ovL5YXvV7lcmuwH0SCzBZr6i00Hj9MLhy1"
        ></stripe-buy-button>`;
</script>
